<div style="border:2px solid orange; padding:15px; margin:10px;">
    <h3> Child Component</h3>

    <p *ngIf="userList.length === 0">No users added yet.</p>

    <table *ngIf="userList.length > 0" border="1" cellpadding="5">

        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Action</th>
        </tr>
        <tr *ngFor="let user of userList; let i = index">
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.age }}</td>
            <td><button (click)="deleteUser(i)">Delete</button></td>
            <!-- <button (click)="adduser()">add user</button> -->

        </tr>
    </table>

</div>
