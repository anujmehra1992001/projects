<div class="dashboard">
    <aside class="sidebar">
        <div class="container">
            <h1>{{ user.name }}</h1>
            <!-- <img [src]="user.image" alt="User Photo" width="32" height="32" /> -->
            <h3>DashBoard</h3>
        </div>
        <p style="color: red">{{ user.name }}</p>

        <nav>
            <ul>
                <li *ngFor="let item of menuItems">
                    <a [routerLink]="['/dashboard', item.path]" routerLinkActive="active">
            {{ item.label }}
          </a>
                </li>
            </ul>
        </nav>
    </aside>

    <section class="main-content">
        <header>
            <h1>Welcome to dashboard</h1>
            <button (click)="logout()">logout</button>
        </header>

        <!-- ✅ Cards Section (add this) -->
        <div class="dashboard-cards">
            <div class="card" *ngFor="let card of cards">
                <div class="card-icon">
                    <i [class]="card.icon"></i>
                </div>
                <div class="card-details">
                    <h3>{{ card.title }}</h3>
                    <p>This Week</p>
                    <h2>{{ card.value }}</h2>
                </div>
            </div>
        </div>

        <!-- Existing dynamic content -->
        <div class="content">
            <router-outlet></router-outlet>
        </div>
    </section>

</div>
