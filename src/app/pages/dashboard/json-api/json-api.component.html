<div class="p-6">
    <h2 class="text-2xl font-bold text-center text-indigo-700 mb-4">User List</h2>

    <div *ngIf="loading" class="text-center text-gray-500">Loading...</div>
    <div *ngIf="error" class="text-red-500 text-center">{{ error }}</div>

    <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3" *ngIf="!loading && !error">
        <div *ngFor="let user of users" class="bg-white p-4 shadow rounded-lg border border-gray-200">
            <h3 class="text-lg font-semibold text-indigo-600">{{ user.name }}</h3>
            <p class="text-sm text-gray-600">{{ user.email }}</p>
        </div>
    </div>
</div>
