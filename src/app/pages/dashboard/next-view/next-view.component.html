<h2>Edit Todo (ID: {{ todoId }})</h2>

<form (ngSubmit)="updateTodo()">
    <div class="mb-3">
        <label class="form-label">Todo</label>
        <input type="text" [(ngModel)]="todoData.todo" name="todo" class="form-control" />
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" [(ngModel)]="todoData.completed" name="completed" class="form-check-input" />
        <label class="form-check-label">Completed</label>
    </div>

    <button type="submit" class="btn btn-success me-2">Save</button>
    <button type="button" class="btn btn-danger" (click)="onCancel()">Cancel</button>
</form>
