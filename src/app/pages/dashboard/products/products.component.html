<div class="container">
    <!-- <h2>Fetch Products with Query Params</h2> -->

    <!-- Controls -->
    <label>User ID:</label>
    <input type="number" [(ngModel)]="userId" />

    <label>Limit:</label>
    <input type="number" [(ngModel)]="limit" />
    <h1>just</h1>


    <button (click)="fetchProducts()">Fetch Data</button>

    <hr>

    <!-- Display Results in Table -->
    <table *ngIf="products.length > 0" border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Body</th>

            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td>{{ product.id }}</td>
                <td>{{ product.title }}</td>
                <td>{{ product.body }}</td>

            </tr>
        </tbody>
    </table>
</div>
