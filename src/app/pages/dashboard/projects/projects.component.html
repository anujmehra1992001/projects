<!-- Filters -->
<div class="p-d-flex p-ai-center p-mb-3" *ngIf="!isLoading">
    <!-- Search -->
    <input pInputText type="text" [(ngModel)]="searchText" placeholder="Search products" class="p-mr-3" />

    <!-- Sorting with Listbox -->
    <p-listbox [options]="sortOptions" [(ngModel)]="sortOption" optionLabel="label" optionValue="value" (onChange)="currentPage = 1">
    </p-listbox>
</div>

<!-- Loading Spinner -->
<p-progressSpinner *ngIf="isLoading"></p-progressSpinner>

<!-- PrimeNG Table -->
<p-table *ngIf="!isLoading && products.length > 0" [value]="filteredProducts" responsiveLayout="scroll">

    <ng-template pTemplate="header">
        <tr>
            <th>Image</th>
            <th>Title</th>
            <th>Price ($)</th>
            <th>Category</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-product>
        <tr>
            <td><img [src]="product.image" alt="product" height="50" /></td>
            <td>{{ product.title }}</td>
            <td>{{ product.price }}</td>
            <td>{{ product.category }}</td>
        </tr>
    </ng-template>
</p-table>

<!-- Pagination -->
<div *ngIf="!isLoading && totalPages > 1" class="p-d-flex p-ai-center p-jc-between p-mt-3">
    <button pButton type="button" label="Previous" (click)="changePage(-1)" [disabled]="currentPage === 1"></button>
    <span>Page {{ currentPage }} of {{ totalPages }}</span>
    <button pButton type="button" label="Next" (click)="changePage(1)" [disabled]="currentPage === totalPages"></button>
</div>
