<!-- Dropdown to Select Role -->
<div style="text-align: center; margin-top: 20px;">
    <label for="role"><strong>Select Role:</strong></label>
    <select id="role" [(ngModel)]="selectedRole" style="padding: 8px; margin-left: 10px;">
    <option value="">-- Choose Role --</option>
    <option *ngFor="let role of roles" [value]="role.name">
      {{ role.name }}
    </option>
  </select>
</div>
<!-- <a router[routerLink]="['/''about']"
>about</a> -->
<!-- Login Form -->
<h2 class="p-text-center p-mt-3">Login</h2>

<form (ngSubmit)="login()" class="p-fluid" style="max-width: 350px; margin: 0 auto;">

    <!-- Email -->
    <div class="p-field p-mb-3">
        <label for="email">Email</label>
        <input id="email" type="email" pInputText [(ngModel)]="email" name="email" placeholder="Enter email" required />
    </div>

    <!-- Password -->
    <div class="p-field p-mb-3">
        <label for="password">Password</label>
        <p-password id="password" [(ngModel)]="password" name="password" placeholder="Enter password" required="false" toggleMask="true">
        </p-password>
    </div>

    <!-- Submit Button -->
    <div class="p-field">
        <button pButton type="submit" label="Login" class="p-button-danger w-full"></button>
    </div>
</form>
