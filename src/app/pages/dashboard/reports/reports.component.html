<!-- reports.component.html -->

<!-- Reports Section -->
<p>reports works!</p>
<a routerLink="report-cards">report-cards</a>
<router-outlet></router-outlet>

<!-- Dropdown to Select Role -->
<div style="text-align: center; margin-top: 20px;">
    <label for="role"><strong>Select Role:</strong></label>
    <select id="role" [(ngModel)]="selectedRole" style="padding: 8px; margin-left: 10px;">
    <option value="">-- Choose Role --</option>
    <option *ngFor="let role of roles" [value]="role.name">
      {{ role.name }}
    </option>
  </select>
</div>
<!-- <a router[routerLink]="['/''about']"
>about</a> -->
<!-- Login Form -->
<h2 style="text-align: center; margin-top: 30px;">Login</h2>

<form (ngSubmit)="login()" style="
    width: 300px;
    margin: 20px auto;
    padding: 20px;
    border: 1px solid #f90303;
    border-radius: 2px;
    background-color: #f9f9f9;
  ">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required style="display: block; width: 100%; margin-bottom: 10px; padding: 8px" />

    <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required style="display: block; width: 100%; margin-bottom: 10px; padding: 8px" />

    <button type="submit" style="
      width: 100%;
      padding: 10px;
      background-color: #e03003;
      color: rgb(16, 15, 15);
      border: none;
      border-radius: 4px;
    ">
    Login
  </button>
</form>
