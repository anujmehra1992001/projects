<h2 style="text-align: center;">Login</h2>

<form (ngSubmit)="login()" style="width: 300px; margin: auto; padding: 20px; border: 1px solid #f90303; border-radius: 2px; background-color: #f9f9f9;">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required style="display: block; width: 100%; margin-bottom: 10px; padding: 8px;" />

    <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required style="display: block; width: 100%; margin-bottom: 10px; padding: 8px;" />

    <button type="submit" style="width: 100%; padding: 10px; background-color: #e03003; color: rgb(16, 15, 15); border: none; border-radius: 4px; transition: 2.s;">
    Login
  </button>
</form>
