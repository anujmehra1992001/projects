<div class="container">

    <div class="login-conatainer">
        <div class="login-card">
            <h2>Welcome back</h2>
            <p>Please log in to your account</p>

            <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" [(ngModel)]="email" required email #emailField="ngModel" placeholder=" " />
                    <div class="error-message" *ngIf="emailField.invalid && emailField.touched">
                        <small *ngIf="emailField.errors?.['required']">Email is required.</small
            >
            <small *ngIf="emailField.errors?.['email']"
              >Please enter a valid email address.</small
            >
          </div>
        </div>
        

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
           placeholder="" 
            name="password"
            [(ngModel)]="password"
            required
            minlength="6"
            maxlength="20"
            #passwordField="ngModel"
          />
          <div
            class="error-message"
            *ngIf="passwordField.invalid && passwordField.touched"
          >
            <small *ngIf="passwordField.errors?.['required']"
              >Password is required.</small
            >
            <small *ngIf="passwordField.errors?.['minlength']"
              >Minimum 6 characters required.</small
            >
            <small *ngIf="passwordField.errors?.['maxlength']"
              >Maximum 20 characters allowed.</small
            >
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>
        
        <button
          type="submit"
          class="login-button"
          [disabled]="!loginForm.valid"
        >
          Login
        </button>
      </form>

      <div class="login-links">
        <a routerLink="/forgot-password" (click)="onForgotClick()"
          >Forgot Password?</a
        >
        <a routerLink="/sign-up" (click)="onSignUpClick()">Sign Up</a>
        
      </div>
    </div>
  </div>
</div>
