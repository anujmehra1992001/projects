<style>
    /* Typography */
    
    .title {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 24px;
        color: #2c2c2c;
        animation: fadeIn 1s ease-in-out;
    }
    /* Input / Select */
    
    .input-select,
    .search-input,
    .sort-select {
        padding: 10px 16px;
        border: 2px solid #0f0f0f;
        border-radius: 6px;
        font-size: 15px;
        min-width: 220px;
        transition: border-color 0.3s, box-shadow 0.3s;
        background-color: #fff;
        color: #333;
    }
    
    .input-select:focus,
    .search-input:focus,
    .sort-select:focus {
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    /* Table Styling */
    
    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        border-color: rgb(255, 253, 253);
        overflow: hidden;
        background-color: #ffffff;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
        animation: fadeIn 0.8s ease-in-out;
    }
    
    thead {
        background-color: #4f46e5;
        color: #0f0e0e;
        text-align: left;
    }
    
    th,
    td {
        padding: 14px 18px;
        font-size: 14px;
        color: #333;
    }
    
    tbody tr {
        border-top: 1px solid #e5e7eb;
    }
    
    tr:hover {
        background-color: #f3f4f6;
        transition: background-color 0.3s;
    }
    /* Pagination */
    
    .pagination {
        margin-top: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-size: 14px;
        animation: fadeIn 1s ease-in-out;
    }
    
    .pagination-button {
        padding: 8px 14px;
        font-size: 14px;
        background-color: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s ease-in-out;
    }
    
    .pagination-button:hover:not(:disabled) {
        background-color: #4338ca;
    }
    
    .pagination-button:disabled {
        background-color: #d1d5db;
        color: #777;
        cursor: not-allowed;
    }
    /* Dropdown option */
    
    .option {
        background-color: #f9fafb;
        color: #333;
    }
    /* Fade animation */
    
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>


<p class="title">Employee List and Salary</p>

<div style="
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 10px;
    flex-wrap: wrap;
  ">
    <input type="text" [(ngModel)]="searchText" (input)="applyFilters()" placeholder="Search by name..." class="input-select" />

    <select [(ngModel)]="sortOption" (change)="sortEmployees()" class="input-select">
    <option value="">Sort by</option>
    <option value="nameAsc">Name Ascending</option>
    <option value="nameDesc">Name Descending</option>
    <option value="salaryAs">Salary Low to High</option>
    <option value="salaryDesc">Salary High to Low</option>
  </select>
</div>

<table *ngIf="filteredEmployees.length > 0">
    <thead>
        <tr>
            <th>#</th>
            <th style="color: #ffffff;">Employee Name</th>
            <th style="color: #ffffff;">Employee Salary</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let emp of paginatedEmployees(); let i = index">
            <td>{{ (currentPage - 1) * itemsPerPage + i + 1 }}</td>
            <td>{{ emp.employee_name }}</td>
            <td>{{ emp.employee_salary }}</td>
        </tr>
    </tbody>
</table>

<div *ngIf="totalPages > 1" class="pagination">
    <button (click)="prevPage()" [disabled]="currentPage === 1" class="pagination-button">
    Previous
  </button> Page {{ currentPage }} of {{ totalPages }}
    <button (click)="nextPage()" [disabled]="currentPage === totalPages" class="pagination-button">
    Next
  </button>
</div>
